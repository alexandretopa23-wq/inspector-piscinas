<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspector Piscinas">
<meta name="theme-color" content="#0a0d14">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Inspector de Piscinas · Res. 000929 de 2026</title>
<style>
:root{
  --bg:#0a0d14;
  --panel:#12161f;
  --panel-2:#171c28;
  --border:#242a3a;
  --border-soft:#1c2130;
  --text:#e7ebf3;
  --text-dim:#8891a5;
  --text-faint:#5b6377;
  --accent:#3aa0ff;
  --accent-dim:#1e3a5c;
  --mono:'SFMono-Regular',ui-monospace,'Cascadia Code','Roboto Mono',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;

  --c-cumple:#22c55e;
  --c-cumple-bg:#0f2a1a;
  --c-nocumple:#ef4444;
  --c-nocumple-bg:#2c1414;
  --c-proceso:#3b82f6;
  --c-proceso-bg:#122238;
  --c-pendiente:#f59e0b;
  --c-pendiente-bg:#2b2008;
  --c-noaplica:#64748b;
  --c-noaplica-bg:#1c212c;

  --r-critico:#dc2626;
  --r-alto:#f97316;
  --r-medio:#eab308;
  --r-bajo:#84cc16;
  --r-sinriesgo:#22c55e;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-tap-highlight-color:transparent;}
body{padding-bottom:100px;}
::selection{background:var(--accent-dim);}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
.mono{font-family:var(--mono);}
.hidden{display:none !important;}

/* ---------- Topbar ---------- */
#topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(10,13,20,0.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
}
#topbar .row1{display:flex;align-items:center;justify-content:space-between;gap:10px;}
#topbar .brand{display:flex;align-items:center;gap:8px;min-width:0;}
#topbar .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 8px var(--accent);}
#topbar .brand-text{font-size:13px;font-weight:600;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#topbar .brand-text .sub{color:var(--text-faint);font-weight:400;font-size:11px;display:block;margin-top:1px;}
#topbar .actions{display:flex;gap:6px;flex:none;}
.iconbtn{
  background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);
  border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:15px;
}
.iconbtn:active{background:var(--border);}
#progressWrap{margin-top:10px;}
#progressBarOuter{height:6px;border-radius:4px;background:var(--panel-2);overflow:hidden;border:1px solid var(--border-soft);}
#progressBarInner{height:100%;background:linear-gradient(90deg,var(--accent),#7ad0ff);border-radius:4px;transition:width .25s ease;width:0%;}
#progressLabel{display:flex;justify-content:space-between;font-size:11px;color:var(--text-faint);margin-top:4px;font-family:var(--mono);}
#progressLabel b{color:var(--text);font-weight:600;}

#pendingSwitchRow{display:flex;align-items:center;justify-content:space-between;margin-top:10px;background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:8px 10px;}
#pendingSwitchRow .lbl{font-size:12px;color:var(--text-dim);}
.switch{position:relative;width:40px;height:22px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.switch .slider{position:absolute;inset:0;background:var(--panel-2);border:1px solid var(--border);border-radius:20px;transition:.15s;}
.switch .slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--text-dim);border-radius:50%;transition:.15s;}
.switch input:checked + .slider{background:var(--accent-dim);border-color:var(--accent);}
.switch input:checked + .slider:before{transform:translateX(18px);background:var(--accent);}

/* ---------- Home / Sessions ---------- */
#homeView{padding:16px 14px;max-width:720px;margin:0 auto;}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);margin:22px 0 10px;font-weight:600;}
.section-title:first-child{margin-top:4px;}
#newInspectionBtn{
  width:100%;background:var(--accent);color:#04101c;border:none;border-radius:12px;
  padding:14px;font-size:14px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:8px;
}
#newInspectionBtn:active{opacity:.85;}
.sessionCard{
  background:var(--panel);border:1px solid var(--border-soft);border-radius:12px;padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
}
.sessionCard:active{background:var(--panel-2);}
.sessionCard .ring{
  width:42px;height:42px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:var(--mono);
  background:conic-gradient(var(--accent) calc(var(--pct)*1%), var(--panel-2) 0);
}
.sessionCard .ring span{background:var(--panel);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.sessionCard .info{flex:1;min-width:0;}
.sessionCard .info .t1{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sessionCard .info .t2{font-size:11.5px;color:var(--text-faint);margin-top:2px;font-family:var(--mono);}
.sessionCard .chev{color:var(--text-faint);font-size:18px;flex:none;}
.emptyState{color:var(--text-faint);font-size:12.5px;text-align:center;padding:26px 10px;border:1px dashed var(--border);border-radius:12px;}

.exportRow{display:flex;gap:8px;margin-top:6px;}
.btn2{
  flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);
  border-radius:10px;padding:11px 8px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn2:active{background:var(--panel-2);}
.btn2.danger{color:#f38a8a;border-color:#3a1f1f;}

/* ---------- Setup modal ---------- */
.modalOverlay{position:fixed;inset:0;background:rgba(4,6,10,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modalSheet{
  background:var(--panel);border-top:1px solid var(--border);border-radius:18px 18px 0 0;
  width:100%;max-width:560px;padding:18px 18px 22px;max-height:88vh;overflow-y:auto;
}
.modalSheet h2{font-size:15px;margin:0 0 14px;font-weight:700;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--text-faint);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.field input,.field select,.field textarea{
  width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);
  border-radius:9px;padding:11px 12px;font-size:14px;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{resize:vertical;min-height:56px;}
.modalActions{display:flex;gap:10px;margin-top:16px;}
.btnPrimary{flex:1;background:var(--accent);color:#04101c;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:14px;}
.btnGhost{flex:1;background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:10px;padding:12px;font-weight:600;font-size:14px;}

/* ---------- Checklist view ---------- */
#checklistView{max-width:720px;margin:0 auto;padding:12px 12px 0;}
#sessionHeader{
  background:var(--panel);border:1px solid var(--border-soft);border-radius:12px;padding:10px 12px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
#sessionHeader .shInfo{min-width:0;}
#sessionHeader .shInfo .l1{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#sessionHeader .shInfo .l2{font-size:11px;color:var(--text-faint);margin-top:2px;font-family:var(--mono);}
#sessionHeader .shBack{flex:none;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;}

.chapter{background:var(--panel);border:1px solid var(--border-soft);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.chapterHead{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;gap:10px;}
.chapterHead:active{background:var(--panel-2);}
.chapterHead .chTitle{font-size:13px;font-weight:700;line-height:1.3;}
.chapterHead .chMeta{font-size:11px;color:var(--text-faint);margin-top:3px;font-family:var(--mono);}
.chapterHead .chRight{display:flex;align-items:center;gap:8px;flex:none;}
.chBadge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;font-family:var(--mono);}
.chBadge.complete{background:var(--c-cumple-bg);color:var(--c-cumple);}
.chBadge.partial{background:var(--c-pendiente-bg);color:var(--c-pendiente);}
.chBadge.empty{background:var(--panel-2);color:var(--text-faint);}
.chArrow{color:var(--text-faint);font-size:13px;transition:transform .15s;}
.chapter.open .chArrow{transform:rotate(90deg);}
.chapterBody{display:none;border-top:1px solid var(--border-soft);padding:10px;}
.chapter.open .chapterBody{display:block;}

/* ---------- Item card ---------- */
.item{background:var(--panel-2);border:1px solid var(--border-soft);border-radius:10px;padding:11px 12px;margin-bottom:8px;}
.item:last-child{margin-bottom:0;}
.item.answered.collapsed{padding:9px 12px;}
.itemTop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.itemId{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);font-weight:600;}
.itemPrio{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.3px;text-transform:uppercase;}
.itemPrio.Alta{background:#301213;color:#f38a8a;}
.itemPrio.Media{background:#2b2008;color:#e0b04a;}
.itemText{font-size:13.5px;line-height:1.4;margin:6px 0 4px;color:var(--text);}
.itemMetaRow{font-size:10.5px;color:var(--text-faint);margin-bottom:8px;}
.hintBox{background:#0e1826;border:1px solid #1c3350;border-radius:8px;padding:8px 10px;margin-bottom:10px;}
.hintBox .hintLbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);font-weight:700;margin-bottom:4px;}
.hintBox .hintTxt{font-size:11.5px;color:#a9c4dd;line-height:1.45;}
.hintBox .hintTxt + .hintTxt{margin-top:5px;padding-top:5px;border-top:1px dashed #1c3350;}
.chapterGuide{background:#0e1826;border:1px solid #1c3350;border-radius:9px;padding:10px 12px;margin-bottom:10px;font-size:11.5px;color:#a9c4dd;line-height:1.5;}
.chapterGuide .cgMarco{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);font-weight:700;margin-bottom:4px;}
.chGuideToggle{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:5px;padding:8px 10px;cursor:pointer;}

.collapsedRow{display:flex;align-items:center;gap:10px;cursor:pointer;}
.collapsedDot{width:9px;height:9px;border-radius:50%;flex:none;}
.collapsedText{flex:1;min-width:0;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim);}
.collapsedBadge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;flex:none;}
.collapsedEdit{color:var(--text-faint);font-size:11px;flex:none;}

.pillRow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px;}
.pill{
  border:1px solid var(--border);background:var(--panel);color:var(--text-dim);
  border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;flex:1;min-width:80px;text-align:center;
}
.pill.small{flex:none;min-width:0;padding:6px 10px;font-size:11px;}
.pill[data-active="1"]{color:#04101c;border-color:transparent;}

.pill[data-k="Cumple"][data-active="1"]{background:var(--c-cumple);}
.pill[data-k="No cumple"][data-active="1"]{background:var(--c-nocumple);color:#fff;}
.pill[data-k="En proceso"][data-active="1"]{background:var(--c-proceso);color:#fff;}
.pill[data-k="Pendiente"][data-active="1"]{background:var(--c-pendiente);}
.pill[data-k="No aplica"][data-active="1"]{background:var(--c-noaplica);color:#fff;}

.pill[data-k="Critico"][data-active="1"]{background:var(--r-critico);color:#fff;}
.pill[data-k="Alto"][data-active="1"]{background:var(--r-alto);}
.pill[data-k="Medio"][data-active="1"]{background:var(--r-medio);}
.pill[data-k="Bajo"][data-active="1"]{background:var(--r-bajo);}
.pill[data-k="Sin riesgo"][data-active="1"]{background:var(--r-sinriesgo);}

.subLabel{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin:10px 0 6px;}
.extraFields{margin-top:4px;border-top:1px dashed var(--border);padding-top:10px;}
.fieldSm{margin-bottom:8px;}
.fieldSm label{display:block;font-size:10.5px;color:var(--text-faint);margin-bottom:4px;}
.fieldSm input,.fieldSm textarea,.fieldSm select{
  width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:8px 9px;font-size:12.5px;
}
.fieldSm textarea{min-height:44px;resize:vertical;}
.twoCol{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.moreToggle{font-size:11px;color:var(--accent);text-align:center;padding:7px;border:1px dashed var(--border);border-radius:7px;margin-top:6px;}
.dueBadge{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:5px;font-weight:700;margin-left:6px;}
.dueBadge.ok{color:var(--text-faint);}
.dueBadge.late{background:var(--c-nocumple-bg);color:var(--c-nocumple);}
.dueBadge.soon{background:var(--c-pendiente-bg);color:var(--c-pendiente);}

.chapterBulkRow{display:flex;gap:6px;margin-bottom:10px;}
.bulkBtn{flex:1;background:var(--panel-2);border:1px solid var(--border);color:var(--text-faint);border-radius:8px;padding:7px;font-size:10.5px;font-weight:600;}

/* ---------- Toast ---------- */
#toast{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#16a34a;color:#fff;padding:9px 16px;border-radius:10px;font-size:12.5px;font-weight:600;
  opacity:0;transition:.2s;z-index:500;box-shadow:0 6px 20px rgba(0,0,0,.4);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#fabSaveBar{
  position:fixed;bottom:0;left:0;right:0;background:rgba(10,13,20,0.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);padding:10px 14px;z-index:60;display:flex;gap:8px;
  max-width:720px;margin:0 auto;
}
#fabSaveBar .savedInfo{flex:1;display:flex;flex-direction:column;justify-content:center;font-size:10.5px;color:var(--text-faint);}
#fabSaveBar .savedInfo b{color:var(--c-cumple);font-family:var(--mono);}
#fabSaveBar button{flex:none;}

@media(min-width:760px){
  #fabSaveBar{left:50%;transform:translateX(-50%);width:720px;border-left:1px solid var(--border);border-right:1px solid var(--border);border-radius:14px 14px 0 0;}
}
</style>
</head>

<div id="topbar">
  <div class="row1">
    <div class="brand">
      <div class="dot"></div>
      <div class="brand-text">Inspector de Piscinas

</div>

<div id="homeView"></div>
<div id="checklistView" class="hidden"></div>

<div id="fabSaveBar" class="hidden">

  <button class="btn2" id="btnExportCsv">⤓ CSV</button>
  <button class="btn2" id="btnExportJson">⤓ JSON</button>
</div>

function getItemHints(itemText){
  var out = [];
  for(var i=0;i<ITEM_HINTS.length && out.length<2;i++){
    if(ITEM_HINTS[i].re.test(itemText)) out.push(ITEM_HINTS[i].hint);
  }
  return out;
}

/* ============ SINCRONIZACIÓN CON GOOGLE SHEETS (por sección) ============ */
var SHEETS_WEBHOOK_URL = ''; // Se carga desde config.json
var LAST_SYNC_TIME = 0;
var PENDING_CHAPTER_SYNCS = {}; // cap -> true, secciones con envío pendiente/fallido para reintentar
var CHAPTER_SYNC_RETRY_INTERVAL = 20000;

function chapterRows(sess, cap){
  return ITEMS.filter(function(it){ return it.cap===cap; })
    .map(function(it){
      var r = sess.responses[it.id] || {};
      return [
        it.id, '', it.cap, it.item, it.enfoque||'', it.prioridad||'',
        sess.meta.sede, sess.meta.piscina, sess.meta.fecha, sess.meta.responsable,
        r.estado||'', r.riesgo||'', r.hallazgo||'', r.accion||'', r.respCierre||'',
        r.fechaCompromiso||'', r.fechaCierre||'', daysRemainingStr(r.fechaCompromiso,r.fechaCierre),
        (r.avance!=null? r.avance : ''), r.evidenciaActual||'', r.evidenciaCierre||'',
        r.linkCarpeta||'', r.observaciones||''
      ];
    })
    .filter(function(row){ return row[10] !== ''; }); // solo respondidos
}

function isChapterComplete(sess, cap){
  var items = ITEMS.filter(function(it){ return it.cap===cap; });
  return items.every(function(it){ return sess.responses[it.id] && sess.responses[it.id].estado; });
}

async function syncChapterToSheets(sess, cap, opts){
  opts = opts || {};
  if(!STORAGE_OK || !SHEETS_WEBHOOK_URL) return false;
  var rows = chapterRows(sess, cap);
  if(rows.length===0) return false;
  try{
    await fetch(SHEETS_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({rows: rows}),
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      signal: AbortSignal.timeout(30000)
    });
    delete PENDING_CHAPTER_SYNCS[cap];
    LAST_SYNC_TIME = Date.now();
    setChapterSyncBadge(cap, 'ok');
    if(!opts.silent) toast('↑ Sección sincronizada con Sheets ('+rows.length+' ítems)');
    return true;
  }catch(e){
    PENDING_CHAPTER_SYNCS[cap] = true;
    console.warn('Sync error (cap: '+cap+'):', e.message);
    setChapterSyncBadge(cap, 'error');
    if(!opts.silent) toast('⚠ Sin conexión — se reintentará automáticamente');
    return false;
  }
}

function setChapterSyncBadge(cap, status){
  var ci = CHAPTERS.indexOf(cap);
  var badge = document.querySelector('.chapter[data-cap="'+ci+'"] .chSyncBadge');
  if(!badge) return;
  if(status==='ok'){ badge.textContent = '✓ Sincronizado'; badge.style.color = 'var(--c-cumple)'; }
  else if(status==='error'){ badge.textContent = '⚠ Reintentando…'; badge.style.color = 'var(--c-nocumple)'; }
  else if(status==='sending'){ badge.textContent = '↑ Enviando…'; badge.style.color = 'var(--text-faint)'; }
  clearTimeout(badge._t);
  if(status==='ok'){ badge._t = setTimeout(function(){ badge.textContent=''; }, 4000); }
}

// Modo automático: cuando una sección queda 100% diligenciada (o se edita
// después de estarlo), se sincroniza sola en un solo lote — no ítem por ítem.
function maybeAutoSyncChapter(cap){
  if(state.prefs.syncMode !== 'auto') return;
  if(!isChapterComplete(state.session, cap)) return;
  setChapterSyncBadge(cap, 'sending');
  syncChapterToSheets(state.session, cap, {silent:true});
}

// Reintento periódico solo para secciones que fallaron (offline, etc.)
setInterval(function(){
  if(state.view!=='checklist' || !state.session) return;
  Object.keys(PENDING_CHAPTER_SYNCS).forEach(function(cap){
    syncChapterToSheets(state.session, cap, {silent:true});
  });
}, CHAPTER_SYNC_RETRY_INTERVAL);

function formatSyncTime(ms){
  var now = Date.now();
  var diff = Math.floor((now - LAST_SYNC_TIME) / 1000);
  if(diff < 60) return 'hace '+diff+'s';
  if(diff < 3600) return 'hace '+Math.floor(diff/60)+'m';
  return 'hace '+Math.floor(diff/3600)+'h';
}


/* ============ STORAGE HELPERS (memoria local del dispositivo) ============
   Usa IndexedDB (más resistente a purgas del navegador, mayor cuota) con
   respaldo automático a localStorage si IndexedDB no está disponible.
   Los datos quedan anclados a ESTE dispositivo/navegador — no viajan entre
   dispositivos ni dependen de ninguna cuenta. Para consolidar datos de
   varios dispositivos usa Exportar/Importar backup. */
var DB_NAME = 'pi_inspector_db', DB_VERSION = 1, DB_STORE = 'kv';
var _dbPromise = null;
function openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise(function(resolve, reject){
    if(!window.indexedDB){ reject(new Error('no indexedDB')); return; }
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(){ req.result.createObjectStore(DB_STORE); };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror = function(){ reject(req.error); };
  });
  return _dbPromise;
}
async function kvGet(key){
  try{
    var db = await openDB();
    return await new Promise(function(resolve, reject){
      var tx = db.transaction(DB_STORE,'readonly');
      var r = tx.objectStore(DB_STORE).get(key);
      r.onsuccess = function(){ resolve(r.result===undefined? null : r.result); };
      r.onerror = function(){ reject(r.error); };
    });
  }catch(e){
    try{ var v = localStorage.getItem('idbfallback_'+key); return v===null? null : v; }catch(e2){ return null; }
  }
}
async function kvSet(key, value){
  try{
    var db = await openDB();
    await new Promise(function(resolve, reject){
      var tx = db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).put(value, key);
      tx.oncomplete = function(){ resolve(true); };
      tx.onerror = function(){ reject(tx.error); };
    });
    return true;
  }catch(e){
    try{ localStorage.setItem('idbfallback_'+key, value); return true; }catch(e2){ return false; }
  }
}
async function kvDelete(key){
  try{
    var db = await openDB();
    await new Promise(function(resolve, reject){
      var tx = db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).delete(key);
      tx.oncomplete = function(){ resolve(true); };
      tx.onerror = function(){ reject(tx.error); };
    });
  }catch(e){
    try{ localStorage.removeItem('idbfallback_'+key); }catch(e2){}
  }
}

async function loadSessions(){
  try{
    var v = await kvGet(LS_SESSIONS);
    return v ? JSON.parse(v) : [];
  }catch(e){ return []; }
}
async function saveSessionsIndex(list){
  await kvSet(LS_SESSIONS, JSON.stringify(list));
}
async function loadSession(id){
  try{
    var v = await kvGet(LS_SESSION_PREFIX+id);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}
async function saveSession(sess){
  sess.updatedAt = Date.now();
  hasUnexportedChanges = true;
  var ok = await kvSet(LS_SESSION_PREFIX+sess.id, JSON.stringify(sess));
  if(!ok){ toast('⚠ Error guardando — exporta un backup por seguridad'); return; }
  var list = await loadSessions();
  var idx = list.findIndex(function(s){return s.id===sess.id;});
  var summary = summarize(sess);
  if(idx>=0) list[idx] = summary; else list.unshift(summary);
  await saveSessionsIndex(list);
  hasUnexportedChanges = false;
  updateSavedLabel();
}
async function deleteSession(id){
  await kvDelete(LS_SESSION_PREFIX+id);
  var list = await loadSessions();
  await saveSessionsIndex(list.filter(function(s){return s.id!==id;}));
}
async function loadPrefs(){
  try{
    var v = await kvGet(LS_PREFS);
    return v ? JSON.parse(v) : {onlyPending:true};
  }catch(e){ return {onlyPending:true}; }
}
async function savePrefs(p){
  await kvSet(LS_PREFS, JSON.stringify(p));
}

function summarize(sess){
  var total = ITEMS.length, answered = 0;
  ITEMS.forEach(function(it){ if(sess.responses[it.id] && sess.responses[it.id].estado) answered++; });
  return {
    id: sess.id, sede: sess.meta.sede, piscina: sess.meta.piscina, fecha: sess.meta.fecha,
    responsable: sess.meta.responsable, updatedAt: sess.updatedAt, createdAt: sess.createdAt,
    total: total, answered: answered
  };
}

var onlyPendingToggle = document.getElementById('onlyPendingToggle');
onlyPendingToggle.checked = !!state.prefs.onlyPending;

function fmtDate(ts){
  if(!ts) return '—';
  var d = new Date(ts);
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
}

async function renderHome(){
  state.view='home'; state.session=null;
  checklistView.classList.add('hidden');
  progressWrap.classList.add('hidden');
  pendingSwitchRow.classList.add('hidden');
  fabSaveBar.classList.add('hidden');
  homeView.classList.remove('hidden');

  var sessions = (await loadSessions()).sort(function(a,b){return (b.updatedAt||0)-(a.updatedAt||0);});
  var html = '';
  html += '<button id="newInspectionBtn">+ Nueva inspección</button>';

  if(sessions.length>0){
    var totalAnswered=0, totalItems=0, criticos=0;
    for(var si=0; si<sessions.length; si++){
      var s = sessions[si];
      totalAnswered += s.answered; totalItems += s.total;
      var full = await loadSession(s.id);
      if(full){
        ITEMS.forEach(function(it){
          var r = full.responses[it.id];
          if(r && r.estado==='No cumple' && (r.riesgo==='Alto'||r.riesgo==='Critico')) criticos++;
        });
      }
    }
    var avgPct = totalItems? Math.round(100*totalAnswered/totalItems):0;
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;">'+
      '<div style="background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:10px;text-align:center;">'+
        '<div style="font-size:20px;font-weight:800;font-family:var(--mono);">'+sessions.length+'</div>'+
        '<div style="font-size:9.5px;color:var(--text-faint);margin-top:2px;">PISCINAS EN PROCESO</div></div>'+
      '<div style="background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:10px;text-align:center;">'+
        '<div style="font-size:20px;font-weight:800;font-family:var(--mono);color:var(--accent);">'+avgPct+'%</div>'+
        '<div style="font-size:9.5px;color:var(--text-faint);margin-top:2px;">AVANCE PROMEDIO</div></div>'+
      '<div style="background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:10px;text-align:center;">'+
        '<div style="font-size:20px;font-weight:800;font-family:var(--mono);color:'+(criticos>0?'var(--c-nocumple)':'var(--c-cumple)')+';">'+criticos+'</div>'+
        '<div style="font-size:9.5px;color:var(--text-faint);margin-top:2px;">HALLAZGOS CRÍTICOS/ALTOS</div></div>'+
    '</div>';
  }

  html += '<div class="section-title">Inspecciones guardadas ('+sessions.length+')</div>';
  if(sessions.length===0){
    html += '<div class="emptyState">Aún no tienes inspecciones. Crea una nueva para empezar a diligenciar los 227 ítems por piscina.</div>';
  } else {
    sessions.forEach(function(s){
      var pct = s.total ? Math.round(100*s.answered/s.total) : 0;
      html += '<div class="sessionCard" data-id="'+s.id+'">'+
        '<div class="ring" style="--pct:'+pct+'"><span>'+pct+'%</span></div>'+
        '<div class="info">'+
          '<div class="t1">'+esc(s.sede||'(sin sede)')+' · '+esc(s.piscina||'(sin piscina)')+'</div>'+
          '<div class="t2">'+esc(s.fecha||'')+' · '+esc(s.responsable||'—')+' · '+s.answered+'/'+s.total+'</div>'+
        '</div>'+
        '<button class="cardDeleteBtn" data-delete-id="'+s.id+'" title="Eliminar inspección" style="flex:none;background:none;border:none;color:var(--c-nocumple);font-size:16px;padding:6px;">🗑</button>'+
        '<div class="chev">›</div>'+
      '</div>';
    });
  }
  html += '<div class="section-title">Respaldo</div>';
  html += '<div class="exportRow">';
  if(sessions.length>0){
    html += '<button class="btn2" id="btnExportAllCsv">⤓ CSV consolidado</button>'+
      '<button class="btn2" id="btnExportAllJson">⤓ Backup JSON</button>';
  }
  html += '<button class="btn2" id="btnImportJson">⤒ Importar backup</button>'+
  '</div>'+
  '<input type="file" id="fileImport" accept="application/json" class="hidden">';
  homeView.innerHTML = html;

  document.getElementById('newInspectionBtn').onclick = function(){ openSetupModal(null); };
  homeView.querySelectorAll('.sessionCard').forEach(function(card){
    card.onclick = function(){ openSession(card.getAttribute('data-id')); };
  });
  homeView.querySelectorAll('.cardDeleteBtn').forEach(function(btn){
    btn.onclick = async function(e){
      e.stopPropagation();
      var id = btn.getAttribute('data-delete-id');
      var card = btn.closest('.sessionCard');
      var label = card.querySelector('.t1').textContent;
      if(!confirm('¿Eliminar por completo la inspección "'+label+'"?\n\nSe borrarán TODAS las respuestas guardadas en este dispositivo. Esta acción no se puede deshacer.\n\nSi ya la sincronizaste con Sheets, esos datos quedan intactos allá — solo se borra la copia local.')) return;
      await deleteSession(id);
      toast('Inspección eliminada');
      renderHome();
    };
  });
  var b1 = document.getElementById('btnExportAllCsv');
  if(b1) b1.onclick = exportAllCsv;
  var b2 = document.getElementById('btnExportAllJson');
  if(b2) b2.onclick = exportAllJson;
  var b3 = document.getElementById('btnImportJson');
  var fileInput = document.getElementById('fileImport');
  if(b3) b3.onclick = function(){ fileInput.click(); };
  if(fileInput) fileInput.onchange = function(){
    var file = fileInput.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = async function(){
      try{
        var data = JSON.parse(reader.result);
        var list = Array.isArray(data) ? data : [data];
        var restored = 0;
        for(var i=0;i<list.length;i++){
          var sess = list[i];
          if(sess && sess.id && sess.meta){ await saveSession(sess); restored++; }
        }
        hasUnexportedChanges = false;
        toast(restored+' inspección(es) restaurada(s)');
        await renderHome();
      }catch(e){ toast('Archivo inválido'); }
    };
    reader.readAsText(file);
  };
  renderStorageBanner(STORAGE_PERSISTED);
}

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

/* ============ SETUP MODAL ============ */
function openSetupModal(existing){
  if(!existing || typeof existing!=='object' || !('sede' in existing)){ existing = null; }
  var overlay = document.createElement('div');
  overlay.className='modalOverlay';
  var today = new Date().toISOString().slice(0,10);
  overlay.innerHTML =
    '<div class="modalSheet">'+
      '<h2>'+(existing?'Editar datos de inspección':'Nueva inspección')+'</h2>'+
      '<div class="field"><label>Sede</label>'+
        '<select id="fSedeSel">'+
          '<option value="">Selecciona una sede…</option>'+
          SEDES.map(function(s){return '<option value="'+esc(s)+'"'+(existing&&existing.sede===s?' selected':'')+'>'+esc(s)+'</option>';}).join('')+
          '<option value="__otra__"'+(existing&&existing.sede&&SEDES.indexOf(existing.sede)<0?' selected':'')+'>Otra (escribir)…</option>'+
        '</select>'+
        '<input id="fSede" placeholder="Nombre de la sede" style="margin-top:6px;" class="'+(existing&&existing.sede&&SEDES.indexOf(existing.sede)<0?'':'hidden')+'" value="'+esc(existing&&SEDES.indexOf(existing.sede)<0?existing.sede:'')+'">'+
      '</div>'+
      '<div class="field"><label>Piscina / estanque</label>'+
        '<select id="fPiscinaSel">'+
          '<option value="">Selecciona una piscina…</option>'+
          PISCINAS.map(function(s){return '<option value="'+esc(s)+'"'+(existing&&existing.piscina===s?' selected':'')+'>'+esc(s)+'</option>';}).join('')+
          '<option value="__otra__"'+(existing&&existing.piscina&&PISCINAS.indexOf(existing.piscina)<0?' selected':'')+'>Otra (escribir)…</option>'+
        '</select>'+
        '<input id="fPiscina" placeholder="Nombre de la piscina" style="margin-top:6px;" class="'+(existing&&existing.piscina&&PISCINAS.indexOf(existing.piscina)<0?'':'hidden')+'" value="'+esc(existing&&PISCINAS.indexOf(existing.piscina)<0?existing.piscina:'')+'">'+
      '</div>'+
      '<div class="field"><label>Fecha de inspección</label><input type="date" id="fFecha" value="'+esc(existing?existing.fecha:today)+'"></div>'+
      '<div class="field"><label>Responsable inspección</label><input id="fResp" placeholder="Nombre" value="'+esc(existing?existing.responsable:'')+'"></div>'+
      '<div class="modalActions">'+
        '<button class="btnGhost" id="mCancel">Cancelar</button>'+
        '<button class="btnPrimary" id="mSave">'+(existing?'Guardar':'Crear e iniciar')+'</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(overlay);
  function wireSelOtra(selId, inpId){
    var sel = document.getElementById(selId), inp = document.getElementById(inpId);
    sel.onchange = function(){
      if(sel.value==='__otra__'){ inp.classList.remove('hidden'); inp.focus(); }
      else { inp.classList.add('hidden'); inp.value=''; }
    };
  }
  wireSelOtra('fSedeSel','fSede');
  wireSelOtra('fPiscinaSel','fPiscina');
  document.getElementById('mCancel').onclick = function(){ overlay.remove(); };
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };
  document.getElementById('mSave').onclick = async function(){
    var sedeSel = document.getElementById('fSedeSel').value;
    var sede = sedeSel==='__otra__' ? document.getElementById('fSede').value.trim() : sedeSel;
    var piscinaSel = document.getElementById('fPiscinaSel').value;
    var piscina = piscinaSel==='__otra__' ? document.getElementById('fPiscina').value.trim() : piscinaSel;
    var fecha = document.getElementById('fFecha').value;
    var resp = document.getElementById('fResp').value.trim();
    if(!sede || !piscina){ toast('Sede y piscina son obligatorias'); return; }
    if(existing){
      state.session.meta.sede=sede; state.session.meta.piscina=piscina;
      state.session.meta.fecha=fecha; state.session.meta.responsable=resp;
      await saveSession(state.session);
      overlay.remove();
      renderChecklistHeader();
      toast('Datos actualizados');
    } else {
      var sess = {
        id: uid(),
        meta:{sede:sede,piscina:piscina,fecha:fecha,responsable:resp},
        responses:{},
        createdAt: Date.now(), updatedAt: Date.now()
      };
      await saveSession(sess);
      overlay.remove();
      openSession(sess.id);
    }
  };
}

/* ============ CHECKLIST VIEW ============ */
async function openSession(id){
  var sess = await loadSession(id);
  if(!sess){ toast('No se encontró la inspección'); return; }
  state.session = sess;
  state.view='checklist';
  homeView.classList.add('hidden');
  checklistView.classList.remove('hidden');
  progressWrap.classList.remove('hidden');
  pendingSwitchRow.classList.remove('hidden');
  fabSaveBar.classList.remove('hidden');
  renderChecklist();
}

function renderChecklistHeader(){
  var sess = state.session;
  var total = ITEMS.length, answered = 0;
  ITEMS.forEach(function(it){ if(sess.responses[it.id] && sess.responses[it.id].estado) answered++; });
  var pct = total? Math.round(100*answered/total):0;
  document.getElementById('progressBarInner').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'% ('+answered+'/'+total+')';
  var hdr = document.getElementById('sessionHeaderInner');
  if(hdr){
    hdr.querySelector('.l1').textContent = sess.meta.sede+' · '+sess.meta.piscina;
    hdr.querySelector('.l2').textContent = sess.meta.fecha+' · '+(sess.meta.responsable||'—');
  }
  document.getElementById('lastSavedAt').textContent = fmtDate(sess.updatedAt);
}

function renderChecklist(){
  var sess = state.session;
  var html = '';
  html += '<div id="sessionHeader">'+
    '<button class="shBack" id="btnBackHome">‹ Inicio</button>'+
    '<div class="shInfo" id="sessionHeaderInner" style="text-align:right;">'+
      '<div class="l1"></div><div class="l2"></div>'+
      '<div id="syncStatus" style="font-size:10px;color:var(--text-faint);margin-top:3px;"></div>'+
    '</div>'+
    '<button class="shBack" id="btnEditMeta">✎</button>'+
    '<button class="shBack" id="btnDangerMenu" title="Reiniciar o eliminar" style="color:var(--c-nocumple);">⋮</button>'+
  '</div>'+
  '<div id="dangerMenu" class="hidden" style="position:absolute;top:52px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:60;overflow:hidden;min-width:220px;">'+
    '<div class="dangerOpt" data-action="reset" style="padding:12px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border-soft);">'+
      '<div style="font-weight:700;">↺ Reiniciar progreso</div>'+
      '<div style="font-size:11px;color:var(--text-faint);margin-top:2px;">Borra todas las respuestas, conserva sede/piscina/fecha</div>'+
    '</div>'+
    '<div class="dangerOpt" data-action="delete" style="padding:12px 14px;font-size:13px;cursor:pointer;color:var(--c-nocumple);">'+
      '<div style="font-weight:700;">🗑 Eliminar inspección</div>'+
      '<div style="font-size:11px;color:var(--text-faint);margin-top:2px;">Borra todo y vuelve al inicio</div>'+
    '</div>'+
  '</div>';
  html += '<div id="searchWrap" style="position:relative;margin-bottom:12px;">'+
    '<input id="searchInput" placeholder="🔍 Buscar ítem por texto o ID (ej. CHK-045, turbidez…)" style="width:100%;background:var(--panel);border:1px solid var(--border-soft);color:var(--text);border-radius:10px;padding:11px 12px;font-size:13px;">'+
    '<div id="searchResults" class="hidden" style="position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;max-height:340px;overflow-y:auto;z-index:40;box-shadow:0 10px 30px rgba(0,0,0,.5);"></div>'+
  '</div>';
  html += '<button id="btnNextPending" style="width:100%;background:var(--panel);border:1px solid var(--border-soft);color:var(--accent);border-radius:10px;padding:10px;font-size:12.5px;font-weight:700;margin-bottom:12px;">⏭ Ir al siguiente ítem pendiente</button>';

  CHAPTERS.forEach(function(cap, ci){
    var items = ITEMS.filter(function(it){return it.cap===cap;});
    var answered = items.filter(function(it){return sess.responses[it.id] && sess.responses[it.id].estado;}).length;
    var complete = answered===items.length;
    html += '<div class="chapter" data-cap="'+ci+'">'+
      '<div class="chapterHead">'+
        '<div>'+
          '<div class="chTitle">'+esc(cap)+'</div>'+
          '<div class="chMeta">'+items.length+' ítems</div>'+
        '</div>'+
        '<div class="chRight">'+
          '<div class="chSyncBadge" style="font-size:10px;font-weight:600;"></div>'+
          '<div class="chBadge '+(complete?'complete':(answered>0?'partial':'empty'))+'">'+answered+'/'+items.length+'</div>'+
          '<div class="chArrow">›</div>'+
        '</div>'+
      '</div>'+
      '<div class="chapterBody" id="chBody-'+ci+'"></div>'+
    '</div>';
  });

  checklistView.innerHTML = html;
  document.getElementById('btnBackHome').onclick = function(){ renderHome(); };
  document.getElementById('btnEditMeta').onclick = function(){ openSetupModal(state.session.meta); };

      menu.classList.add('hidden');

        if(!confirm('Confirma una vez más: esto borra TODAS las respuestas de esta inspección. ¿Continuar?')) return;
        sess.responses = {};
        await saveSession(sess);
        renderChecklist();
        toast('Progreso reiniciado');
      } else if(action==='delete'){
        if(!confirm('¿Eliminar por completo la inspección "'+label+'"?\n\nEsto borra la inspección entera de este dispositivo. Esta acción no se puede deshacer.\n\nSi ya sincronizaste ítems con Sheets, esos datos quedan intactos allá.')) return;
        if(!confirm('Confirma una vez más: esto elimina la inspección completa. ¿Continuar?')) return;
        await deleteSession(sess.id);
        toast('Inspección eliminada');
        renderHome();
      }
    };
  });
  checklistView.querySelectorAll('.chapterHead').forEach(function(head){
    head.onclick = function(){
      var chapter = head.parentElement;
      var isOpen = chapter.classList.contains('open');
      checklistView.querySelectorAll('.chapter.open').forEach(function(c){
        if(c!==chapter){ c.classList.remove('open'); }
      });
      chapter.classList.toggle('open', !isOpen);
      if(!isOpen){
        var ci = chapter.getAttribute('data-cap');
        renderChapterBody(ci);
      }
    };
  });
  renderChecklistHeader();
  wireSearch();
  document.getElementById('btnNextPending').onclick = jumpToNextPending;
}

function jumpToItem(itemId, forceShowAll){
  var it = ITEMS.find(function(x){return x.id===itemId;});
  if(!it) return;
  var ci = CHAPTERS.indexOf(it.cap);
  var chapter = document.querySelector('.chapter[data-cap="'+ci+'"]');
  if(!chapter) return;
  checklistView.querySelectorAll('.chapter.open').forEach(function(c){ if(c!==chapter) c.classList.remove('open'); });
  chapter.classList.add('open');
  renderChapterBody(ci, forceShowAll);
  setTimeout(function(){
    var el = document.querySelector('#chBody-'+ci+' .item[data-id="'+itemId+'"]');
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.style.transition='background .3s';
      el.style.background = 'var(--accent-dim)';
      setTimeout(function(){ el.style.background=''; }, 900);
    } else {
      chapter.scrollIntoView({behavior:'smooth', block:'start'});
    }
  }, 60);
}

function jumpToNextPending(){
  var sess = state.session;
  var next = ITEMS.find(function(it){ var r = sess.responses[it.id]; return !(r && r.estado); });
  if(!next){ toast('¡Todos los ítems están diligenciados!'); return; }
  jumpToItem(next.id, true);
}

function wireSearch(){
  var input = document.getElementById('searchInput');
  var results = document.getElementById('searchResults');
  input.oninput = function(){
    var q = input.value.trim().toLowerCase();
    if(q.length<2){ results.classList.add('hidden'); results.innerHTML=''; return; }
    var matches = ITEMS.filter(function(it){
      return it.id.toLowerCase().indexOf(q)>=0 || it.item.toLowerCase().indexOf(q)>=0;
    }).slice(0,10);
    if(matches.length===0){
      results.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-faint);">Sin resultados</div>';
    } else {
      results.innerHTML = matches.map(function(it){
        var r = state.session.responses[it.id];
        var estado = r && r.estado ? r.estado : 'Sin responder';
        return '<div class="searchResultRow" data-jump="'+it.id+'" style="padding:10px 12px;border-bottom:1px solid var(--border-soft);cursor:pointer;">'+
          '<div style="font-size:11px;color:var(--text-faint);font-family:var(--mono);">'+it.id+' · '+esc(it.cap)+' · '+estado+'</div>'+
          '<div style="font-size:12.5px;color:var(--text);margin-top:2px;">'+esc(it.item)+'</div>'+
        '</div>';
      }).join('');
    }
    results.classList.remove('hidden');
    results.querySelectorAll('[data-jump]').forEach(function(row){
      row.onclick = function(){
        jumpToItem(row.getAttribute('data-jump'), true);
        results.classList.add('hidden');
        input.value=''; input.blur();
      };
    });
  };
  document.addEventListener('click', function(e){
    if(!input.contains(e.target) && !results.contains(e.target)) results.classList.add('hidden');
  });
}

function renderChapterBody(ci, forceShowAll){
  var cap = CHAPTERS[ci];
  var sess = state.session;
  var items = ITEMS.filter(function(it){return it.cap===cap;});
  var onlyPending = forceShowAll ? false : state.prefs.onlyPending;
  var body = document.getElementById('chBody-'+ci);

  var visibleItems = onlyPending ? items.filter(function(it){
    var r = sess.responses[it.id];
    return !(r && r.estado);
  }) : items;

  var html = '';
  var guide = CHAPTER_GUIDE[cap];
  if(guide){
    html += '<div class="chGuideToggle" data-action="toggleGuide">📖 Ver criterio normativo del capítulo ('+esc(guide.marco)+') ▾</div>'+
      '<div class="chapterGuide hidden" id="guideBody-'+ci+'"><div class="cgMarco">'+esc(guide.marco)+'</div>'+esc(guide.texto)+'</div>';
  }
  html += '<div class="chapterBulkRow">'+
    '<button class="bulkBtn" data-bulk="Cumple" data-cap="'+ci+'">✓ Marcar todo Cumple</button>'+
    '<button class="bulkBtn" data-bulk="No aplica" data-cap="'+ci+'">— Marcar todo No aplica</button>'+
  '</div>';
  var answeredInCap = items.filter(function(it){ return sess.responses[it.id] && sess.responses[it.id].estado; }).length;
  if(state.prefs.syncMode==='manual' && answeredInCap>0){
    html += '<div class="chapterBulkRow">'+
      '<button class="bulkBtn" data-sync-chapter="'+ci+'" style="width:100%;color:var(--accent);border-color:var(--accent-dim);">↑ Sincronizar esta sección con Sheets ('+answeredInCap+' ítems)</button>'+
    '</div>';
  }

  if(visibleItems.length===0){
    html += '<div class="emptyState" style="padding:14px;">Todos los ítems de este capítulo ya fueron diligenciados. Desactiva "Solo pendientes" para revisarlos.</div>';
  }

  visibleItems.forEach(function(it){
    html += renderItemCard(it, sess.responses[it.id]);
  });
  body.innerHTML = html;
  wireItemCards(body);
  var guideToggle = body.querySelector('[data-action="toggleGuide"]');
  if(guideToggle){
    guideToggle.onclick = function(){
      var gb = document.getElementById('guideBody-'+ci);
      var isHidden = gb.classList.contains('hidden');
      gb.classList.toggle('hidden');
      guideToggle.textContent = '📖 Ver criterio normativo del capítulo ('+CHAPTER_GUIDE[cap].marco+') ' + (isHidden?'▴':'▾');
    };
  }

  body.querySelectorAll('.bulkBtn[data-bulk]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var estadoVal = btn.getAttribute('data-bulk');
      if(!confirm('¿Marcar los '+items.length+' ítems de "'+cap+'" como "'+estadoVal+'"? Podrás ajustar cualquiera individualmente después.')) return;
      items.forEach(function(it){
        var r = sess.responses[it.id] || {};
        r.estado = estadoVal;
        r.riesgo = 'Sin riesgo';
        sess.responses[it.id] = r;
      });
      saveSession(sess);
      renderChapterBody(ci);
      updateChapterBadge(ci);
      renderChecklistHeader();
      maybeAutoSyncChapter(cap);
      toast('Capítulo actualizado');
    };
  });
  var syncBtn = body.querySelector('[data-sync-chapter]');
  if(syncBtn){
    syncBtn.onclick = function(e){
      e.stopPropagation();
      syncBtn.textContent = '↑ Enviando…';
      syncBtn.disabled = true;
      syncChapterToSheets(sess, cap).then(function(){
        renderChapterBody(ci);
      });
    };
  }
}

function riskSuggestion(prioridad){
  if(prioridad==='Alta') return 'Alto';
  if(prioridad==='Media') return 'Medio';
  return 'Bajo';
}

function dueBadgeHtml(fechaCompromiso){
  if(!fechaCompromiso) return '';
  var today = new Date(); today.setHours(0,0,0,0);
  var due = new Date(fechaCompromiso+'T00:00:00');
  var diffDays = Math.round((due-today)/86400000);
  if(diffDays<0) return '<span class="dueBadge late">Vencido '+Math.abs(diffDays)+'d</span>';
  if(diffDays<=3) return '<span class="dueBadge soon">Vence en '+diffDays+'d</span>';
  return '<span class="dueBadge ok">Vence en '+diffDays+'d</span>';
}

function renderItemCard(it, r){
  r = r || {};
  var isAnswered = !!r.estado;
  var showExtra = CIERRA_ITEM_ESTADOS.indexOf(r.estado)>=0;

  if(isAnswered){
    var estColorVar = {
      'Cumple':'var(--c-cumple)','No cumple':'var(--c-nocumple)','En proceso':'var(--c-proceso)',
      'Pendiente':'var(--c-pendiente)','No aplica':'var(--c-noaplica)'
    }[r.estado];
    var estBg = {
      'Cumple':'var(--c-cumple-bg)','No cumple':'var(--c-nocumple-bg)','En proceso':'var(--c-proceso-bg)',
      'Pendiente':'var(--c-pendiente-bg)','No aplica':'var(--c-noaplica-bg)'
    }[r.estado];
    return '<div class="item answered collapsed" data-id="'+it.id+'">'+
      '<div class="collapsedRow" data-action="expand">'+
        '<div class="collapsedDot" style="background:'+estColorVar+'"></div>'+
        '<div class="collapsedText"><span class="mono itemId">'+it.id+'</span> — '+esc(it.item)+'</div>'+
        '<div class="collapsedBadge" style="background:'+estBg+';color:'+estColorVar+'">'+r.estado+'</div>'+
        '<div class="collapsedEdit">✎</div>'+
      '</div>'+
      '<div class="fullCard hidden">'+renderItemFull(it,r,showExtra)+'</div>'+
    '</div>';
  }
  return '<div class="item" data-id="'+it.id+'">'+renderItemFull(it,r,showExtra)+'</div>';
}

function renderItemFull(it,r,showExtra){
  var html = '';
  html += '<div class="itemTop">'+
    '<span class="itemId mono">'+it.id+'</span>'+
    (it.prioridad? '<span class="itemPrio '+it.prioridad+'">'+it.prioridad+'</span>' : '')+
  '</div>';
  html += '<div class="itemText">'+esc(it.item)+'</div>';
  html += '<div class="itemMetaRow">'+esc(it.enfoque||'')+'</div>';

  var hints = getItemHints(it.item);
  if(hints.length){
    html += '<div class="hintBox"><div class="hintLbl">Qué validar</div>'+
      hints.map(function(h){return '<div class="hintTxt">'+esc(h)+'</div>';}).join('')+
    '</div>';
  }

  html += '<div class="pillRow" data-group="estado">';
  ESTADOS.forEach(function(e){
    html += '<button class="pill" data-k="'+e+'" data-active="'+(r.estado===e?1:0)+'">'+e+'</button>';
  });
  html += '</div>';

  html += '<div class="extraWrap '+(showExtra?'':'hidden')+'">';
  html += '<div class="subLabel">Nivel de riesgo</div>';
  html += '<div class="pillRow" data-group="riesgo">';
  RIESGOS.forEach(function(rk){
    html += '<button class="pill small" data-k="'+rk+'" data-active="'+(r.riesgo===rk?1:0)+'">'+RIESGOS_LABEL[rk]+'</button>';
  });
  html += '</div>';

  html += '<div class="extraFields">'+
    '<div class="fieldSm"><label>Hallazgo / condición observada</label><textarea data-f="hallazgo">'+esc(r.hallazgo)+'</textarea></div>'+
    '<div class="fieldSm"><label>Acción correctiva / preventiva</label><textarea data-f="accion">'+esc(r.accion)+'</textarea></div>'+
    '<div class="twoCol">'+
      '<div class="fieldSm"><label>Responsable cierre</label><input data-f="respCierre" value="'+esc(r.respCierre)+'"></div>'+
      '<div class="fieldSm"><label>Fecha compromiso '+dueBadgeHtml(r.fechaCompromiso)+'</label><input type="date" data-f="fechaCompromiso" value="'+esc(r.fechaCompromiso)+'"></div>'+
    '</div>'+
    '<div class="subLabel">% avance</div>'+
    '<div class="pillRow" data-group="avance">'+
      [0,25,50,75,100].map(function(v){
        return '<button class="pill small" data-k="'+v+'" data-active="'+((r.avance||0)==v?1:0)+'">'+v+'%</button>';
      }).join('')+
    '</div>'+
    '<div class="moreToggle" data-action="toggleMore">Más campos (evidencia, cierre, observaciones) ▾</div>'+
    '<div class="moreFields hidden">'+
      '<div class="fieldSm"><label>Fecha de cierre</label><input type="date" data-f="fechaCierre" value="'+esc(r.fechaCierre)+'"></div>'+
      '<div class="fieldSm"><label>Evidencia fotográfica - estado actual</label><input data-f="evidenciaActual" placeholder="Nota o nombre de archivo" value="'+esc(r.evidenciaActual)+'"></div>'+
      '<div class="fieldSm"><label>Evidencia fotográfica - cierre</label><input data-f="evidenciaCierre" placeholder="Nota o nombre de archivo" value="'+esc(r.evidenciaCierre)+'"></div>'+
      '<div class="fieldSm"><label>Link carpeta / evidencia</label><input data-f="linkCarpeta" placeholder="https://drive..." value="'+esc(r.linkCarpeta)+'"></div>'+
      '<div class="fieldSm"><label>Observaciones</label><textarea data-f="observaciones">'+esc(r.observaciones)+'</textarea></div>'+
    '</div>'+
  '</div>';
  html += '</div>';
  return html;
}

function wireItemCards(container){
  container.querySelectorAll('.item').forEach(function(itemEl){
    var id = itemEl.getAttribute('data-id');
    var it = ITEMS.find(function(x){return x.id===id;});

    var collapsedRow = itemEl.querySelector('[data-action="expand"]');
    if(collapsedRow){
      collapsedRow.onclick = function(){
        itemEl.classList.remove('answered','collapsed');
        itemEl.querySelector('.fullCard').classList.remove('hidden');
        var full = itemEl.querySelector('.fullCard');
        itemEl.innerHTML = full.innerHTML;
        wireSingleItem(itemEl, it);
      };
      return;
    }
    wireSingleItem(itemEl, it);
  });
}

function wireSingleItem(itemEl, it){
  var sess = state.session;

  function getResp(){
    var r = sess.responses[it.id];
    if(!r){ r = {}; sess.responses[it.id]=r; }
    return r;
  }

  var estadoRow = itemEl.querySelector('[data-group="estado"]');
  if(estadoRow){
    estadoRow.querySelectorAll('.pill').forEach(function(p){
      p.onclick = function(){
        var r = getResp();
        var val = p.getAttribute('data-k');
        r.estado = val;
        var showExtra = CIERRA_ITEM_ESTADOS.indexOf(val)>=0;
        if(showExtra && !r.riesgo){ r.riesgo = riskSuggestion(it.prioridad); }
        if(!showExtra){ r.riesgo = 'Sin riesgo'; }
        saveSession(sess);
        refreshAfterAnswer(itemEl, it, r);
        maybeAutoSyncChapter(it.cap);
      };
    });
  }
  var riesgoRow = itemEl.querySelector('[data-group="riesgo"]');
  if(riesgoRow){
    riesgoRow.querySelectorAll('.pill').forEach(function(p){
      p.onclick = function(){
        var r = getResp();
        r.riesgo = p.getAttribute('data-k');
        saveSession(sess);
        riesgoRow.querySelectorAll('.pill').forEach(function(x){x.setAttribute('data-active', x===p?1:0);});
      };
    });
  }
  var avanceRow = itemEl.querySelector('[data-group="avance"]');
  if(avanceRow){
    avanceRow.querySelectorAll('.pill').forEach(function(p){
      p.onclick = function(){
        var r = getResp();
        r.avance = parseInt(p.getAttribute('data-k'),10);
        saveSession(sess);
        avanceRow.querySelectorAll('.pill').forEach(function(x){x.setAttribute('data-active', x===p?1:0);});
      };
    });
  }
  itemEl.querySelectorAll('[data-f]').forEach(function(f){
    f.oninput = function(){
      var r = getResp();
      r[f.getAttribute('data-f')] = f.value;
      saveSession(sess);
      updateSavedLabel();
    };
  });
  var moreToggle = itemEl.querySelector('[data-action="toggleMore"]');
  if(moreToggle){
    moreToggle.onclick = function(){
      var mf = itemEl.querySelector('.moreFields');
      var isHidden = mf.classList.contains('hidden');
      mf.classList.toggle('hidden');
      moreToggle.textContent = 'Más campos (evidencia, cierre, observaciones) ' + (isHidden?'▴':'▾');
    };
  }
}

function refreshAfterAnswer(itemEl, it, r){
  var chapter = itemEl.closest('.chapter');
  var ci = chapter.getAttribute('data-cap');
  updateChapterBadge(ci);
  renderChecklistHeader();
  if(state.prefs.onlyPending){
    itemEl.remove();
    var body = document.getElementById('chBody-'+ci);
    if(body && !body.querySelector('.item')){
      var items = ITEMS.filter(function(x){return x.cap===CHAPTERS[ci];});
      body.insertAdjacentHTML('beforeend','<div class="emptyState" style="padding:14px;">Todos los ítems de este capítulo ya fueron diligenciados. Desactiva "Solo pendientes" para revisarlos.</div>');
    }
  } else {
    var showExtra = CIERRA_ITEM_ESTADOS.indexOf(r.estado)>=0;
    itemEl.innerHTML = renderItemFull(it, r, showExtra);
    wireSingleItem(itemEl, it);
  }
}

function updateChapterBadge(ci){
  var cap = CHAPTERS[ci];
  var sess = state.session;
  var items = ITEMS.filter(function(it){return it.cap===cap;});
  var answered = items.filter(function(it){return sess.responses[it.id] && sess.responses[it.id].estado;}).length;
  var complete = answered===items.length;
  var chapter = document.querySelector('.chapter[data-cap="'+ci+'"]');
  if(!chapter) return;
  var badge = chapter.querySelector('.chBadge');
  badge.textContent = answered+'/'+items.length;
  badge.className = 'chBadge '+(complete?'complete':(answered>0?'partial':'empty'));
}

function updateSavedLabel(){
  var el = document.getElementById('lastSavedAt');
  if(el) el.textContent = fmtDate(Date.now());
}

/* ============ EXPORT ============ */
var CSV_HEADERS = ['ID','norma aplicable','Capítulo / componente','Ítem de verificación','Enfoque técnico',
  'Prioridad sugerida','Sede','Piscina / estanque','Fecha inspección','Responsable inspección','Estado',
  'Nivel de riesgo','Hallazgo / condición observada','Acción correctiva / preventiva','Responsable cierre',
  'Fecha compromiso','Fecha cierre','Días restantes / vencido','% avance','Evidencia fotográfica - estado actual',
  'Evidencia fotográfica - cierre','Link carpeta / evidencia','Observaciones'];

function daysRemainingStr(fechaCompromiso, fechaCierre){
  if(fechaCierre) return 'Cerrado';
  if(!fechaCompromiso) return '';
  var today = new Date(); today.setHours(0,0,0,0);
  var due = new Date(fechaCompromiso+'T00:00:00');
  var diff = Math.round((due-today)/86400000);
  return diff<0 ? ('Vencido '+Math.abs(diff)+'d') : (diff+'d');
}

function csvEscape(v){
  v = v==null? '' : String(v);
  if(/[",\n;]/.test(v)) return '"'+v.replace(/"/g,'""')+'"';
  return v;
}

function sessionToRows(sess, onlyAnswered){
  var rows = ITEMS.map(function(it){
    var r = sess.responses[it.id] || {};
    return [
      it.id, '', it.cap, it.item, it.enfoque||'', it.prioridad||'',
      sess.meta.sede, sess.meta.piscina, sess.meta.fecha, sess.meta.responsable,
      r.estado||'', r.riesgo||'', r.hallazgo||'', r.accion||'', r.respCierre||'',
      r.fechaCompromiso||'', r.fechaCierre||'', daysRemainingStr(r.fechaCompromiso,r.fechaCierre),
      (r.avance!=null? r.avance : ''), r.evidenciaActual||'', r.evidenciaCierre||'',
      r.linkCarpeta||'', r.observaciones||''
    ];
  });
  if(onlyAnswered){
    rows = rows.filter(function(row){ return row[10] !== ''; }); // columna 'Estado' (índice 10)
  }
  return rows;
}

function downloadFile(filename, content, mime){
  var blob = new Blob([content], {type:mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);}, 2000);
}

function rowsToCsv(rows){
  var lines = [CSV_HEADERS.map(csvEscape).join(',')];
  rows.forEach(function(row){ lines.push(row.map(csvEscape).join(',')); });
  return '\uFEFF' + lines.join('\r\n');
}

document.getElementById('btnExportCsv').onclick = function(){
  var sess = state.session; if(!sess) return;
  var csv = rowsToCsv(sessionToRows(sess));
  downloadFile('inspeccion_'+sess.meta.sede+'_'+sess.meta.piscina+'_'+sess.meta.fecha+'.csv', csv, 'text/csv;charset=utf-8');
  hasUnexportedChanges = false;
  toast('CSV exportado');
};
document.getElementById('btnExportJson').onclick = function(){
  var sess = state.session; if(!sess) return;
  downloadFile('inspeccion_'+sess.meta.sede+'_'+sess.meta.piscina+'_'+sess.meta.fecha+'.json', JSON.stringify(sess,null,2), 'application/json');
  hasUnexportedChanges = false;
  toast('JSON exportado');
};
async function exportAllCsv(){
  var sessions = await loadSessions();
  var allRows = [];
  for(var i=0;i<sessions.length;i++){
    var full = await loadSession(sessions[i].id);
    if(full) allRows = allRows.concat(sessionToRows(full));
  }
  if(allRows.length===0){ toast('No hay datos para exportar'); return; }
  downloadFile('inspecciones_consolidado_'+(new Date().toISOString().slice(0,10))+'.csv', rowsToCsv(allRows), 'text/csv;charset=utf-8');
  hasUnexportedChanges = false;
  toast('CSV consolidado exportado ('+sessions.length+' piscinas)');
}
async function exportAllJson(){
  var sessions = await loadSessions();
  var all = [];
  for(var i=0;i<sessions.length;i++){
    var full = await loadSession(sessions[i].id);
    if(full) all.push(full);
  }
  downloadFile('backup_inspecciones_'+(new Date().toISOString().slice(0,10))+'.json', JSON.stringify(all,null,2), 'application/json');
  hasUnexportedChanges = false;
  toast('Backup exportado');
}
